name: Build Windows

# Build a Windows installer (.msi + .exe) on a Windows runner.
# Triggers:
#   - pushing a tag like v1.0.0  -> builds and publishes a GitHub Release
#   - manual "Run workflow"       -> builds and uploads the installers as artifacts
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push, create/append a GitHub Release with the installers.
          # On manual runs, tagName is empty so no release is created (artifacts only).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Markdown Live ${{ github.ref_name }}'
          releaseBody: 'Windows build of Markdown Live. Download the .msi or .exe installer below.'
          releaseDraft: false
          prerelease: false

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
