name: Build Desktop

# Build desktop installers on native runners for each OS.
#   - Windows -> .msi + .exe (NSIS)
#   - Linux   -> .AppImage + .deb + .rpm
# Triggers:
#   - pushing a tag like v1.0.0 -> builds and publishes a GitHub Release
#   - manual "Run workflow"      -> builds and uploads installers as artifacts
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-name: windows-installers
            bundle-paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          # Ubuntu 22.04 links against an older glibc, so the resulting
          # AppImage runs on a wider range of Linux distributions.
          - platform: ubuntu-22.04
            artifact-name: linux-installers
            bundle-paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libssl-dev \
            libxdo-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push, create/append a GitHub Release with the installers.
          # On manual runs, tagName is empty so no release is created (artifacts only).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Markdown Live ${{ github.ref_name }}'
          releaseBody: 'Desktop build of Markdown Live. Download the installer for your platform below.'
          releaseDraft: false
          prerelease: false

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-paths }}
          if-no-files-found: warn
